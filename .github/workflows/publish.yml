name: Publish to npm

on:
  # Trigger on version tags pushed manually (npm version patch && git push --tags)
  push:
    tags:
      - "v*"
  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Skip if release-please already published (check if this tag was created by release-please)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - name: Check if version already published
        id: check
        run: |
          PACKAGE_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          if npm view @rynfar/meridian@$PACKAGE_VERSION version 2>/dev/null; then
            echo "already_published=true" >> $GITHUB_OUTPUT
            echo "⚠️ Version $PACKAGE_VERSION is already published to npm"
          else
            echo "already_published=false" >> $GITHUB_OUTPUT
            echo "✅ Version $PACKAGE_VERSION needs to be published"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        if: steps.check.outputs.already_published == 'false'
        run: bun install

      - name: Run tests
        if: steps.check.outputs.already_published == 'false'
        run: npm test

      - name: Build
        if: steps.check.outputs.already_published == 'false'
        run: bun run build

      - name: Publish to npm
        if: steps.check.outputs.already_published == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.already_published == 'false'
        run: |
          gh release create "v${{ steps.check.outputs.version }}" \
            --title "v${{ steps.check.outputs.version }}" \
            --generate-notes \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.already_published }}" == "true" ]; then
            echo "### ⚠️ Skipped — v${{ steps.check.outputs.version }} already on npm" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Published @rynfar/meridian@${{ steps.check.outputs.version }} to npm" >> $GITHUB_STEP_SUMMARY
            echo "### 📦 Created GitHub Release v${{ steps.check.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          fi
