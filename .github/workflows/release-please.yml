name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_only:
        description: "Skip release-please, just publish the current version to npm"
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    if: ${{ !inputs.publish_only }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs['meridian--release_created'] }}
      tag_name: ${{ steps.release.outputs['meridian--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-labeling: true

  publish:
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.release_created || inputs.publish_only) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - uses: oven-sh/setup-bun@v2

      - run: bun install
      - run: npm test
      - run: bun run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
